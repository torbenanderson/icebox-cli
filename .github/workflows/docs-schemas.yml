name: Docs Schemas

on:
  push:
    paths:
      - "docs/architecture/contracts/**"
      - ".github/workflows/docs-schemas.yml"
  pull_request:
    paths:
      - "docs/architecture/contracts/**"
      - ".github/workflows/docs-schemas.yml"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install check-jsonschema
        run: pip install check-jsonschema==0.30.0

      - name: Validate schemas against metaschema
        run: |
          check-jsonschema --check-metaschema docs/architecture/contracts/manifest.schema.json
          check-jsonschema --check-metaschema docs/architecture/contracts/config.schema.json
          check-jsonschema --check-metaschema docs/architecture/contracts/vault.schema.json
          check-jsonschema --check-metaschema docs/architecture/contracts/bundle-manifest.schema.json

      - name: Validate fixtures against schemas
        run: |
          check-jsonschema --schemafile docs/architecture/contracts/manifest.schema.json docs/architecture/contracts/examples/manifest.example.json
          check-jsonschema --schemafile docs/architecture/contracts/config.schema.json docs/architecture/contracts/examples/config.example.json
          check-jsonschema --schemafile docs/architecture/contracts/vault.schema.json docs/architecture/contracts/examples/vault.example.json
          check-jsonschema --schemafile docs/architecture/contracts/bundle-manifest.schema.json docs/architecture/contracts/examples/bundle-manifest.example.json
