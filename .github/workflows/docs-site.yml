name: Docs Site

on:
  push:
    paths:
      - "docs/**"
      - "book.toml"
      - ".github/workflows/docs-site.yml"
      - "Cargo.toml"
      - "src/**"
  pull_request:
    paths:
      - "docs/**"
      - "book.toml"
      - ".github/workflows/docs-site.yml"
      - "Cargo.toml"
      - "src/**"

jobs:
  build-docs:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect Rust project
        id: detect
        shell: bash
        run: |
          if [ -f Cargo.toml ]; then
            echo "has_cargo=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_cargo=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup mdBook
        uses: peaceiris/actions-mdbook@v2
        with:
          mdbook-version: "latest"

      - name: Build mdBook site
        run: mdbook build

      - name: Setup Rust toolchain
        if: steps.detect.outputs.has_cargo == 'true'
        uses: dtolnay/rust-toolchain@stable

      - name: Build rustdoc
        if: steps.detect.outputs.has_cargo == 'true'
        run: cargo doc --workspace --all-features --no-deps

      - name: Stage docs artifact
        shell: bash
        run: |
          rm -rf site
          mkdir -p site
          cp -R book site/book

          if [ -d target/doc ]; then
            cp -R target/doc site/api
          else
            mkdir -p site/api
            printf '%s\n' \
              '<!doctype html>' \
              '<html>' \
              '  <head>' \
              '    <meta charset="utf-8" />' \
              '    <title>API Docs Unavailable</title>' \
              '  </head>' \
              '  <body>' \
              '    <h1>API docs not generated</h1>' \
              '    <p>No Cargo.toml was detected, so rustdoc output was skipped.</p>' \
              '  </body>' \
              '</html>' > site/api/index.html
          fi

      - name: Upload docs artifact
        uses: actions/upload-artifact@v6
        with:
          name: docs-site
          path: site
