name: Mutation Testing

on:
  schedule:
    # GitHub cron uses UTC; 01:00 Saturday UTC maps to Friday 5:00 PM Pacific in standard time.
    - cron: "0 1 * * 6"
  workflow_dispatch:

jobs:
  cargo-mutants:
    name: Cargo Mutants (weekly, Linux)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect Rust project
        id: detect
        shell: bash
        run: |
          if [ -f Cargo.toml ]; then
            echo "has_cargo=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_cargo=false" >> "$GITHUB_OUTPUT"
          fi
          if find . -type f -name '*.rs' | grep -q .; then
            echo "has_rust_sources=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_rust_sources=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Fail on inconsistent Rust scaffold
        if: steps.detect.outputs.has_cargo != 'true' && steps.detect.outputs.has_rust_sources == 'true'
        run: |
          echo "Rust source files were found but Cargo.toml is missing."
          echo "This is treated as a CI failure to avoid silent skips."
          exit 1

      - name: Setup Rust toolchain
        if: steps.detect.outputs.has_cargo == 'true'
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        if: steps.detect.outputs.has_cargo == 'true'
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-mutants
        if: steps.detect.outputs.has_cargo == 'true'
        uses: taiki-e/install-action@cargo-mutants

      - name: Prepare mutation logs
        if: steps.detect.outputs.has_cargo == 'true'
        run: mkdir -p ci-logs

      - name: Run cargo mutants
        if: steps.detect.outputs.has_cargo == 'true'
        shell: bash
        run: |
          set -euo pipefail
          cargo mutants --all-targets --all-features 2>&1 | tee ci-logs/cargo-mutants.log

      - name: Upload mutation logs
        if: always() && steps.detect.outputs.has_cargo == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: mutation-testing-logs-linux
          path: ci-logs/
          retention-days: 90

      - name: Skip (docs-only mode, no Cargo.toml)
        if: steps.detect.outputs.has_cargo != 'true'
        run: echo "No Cargo.toml found and no Rust source files detected. Mutation testing is intentionally skipped in docs-only mode."
